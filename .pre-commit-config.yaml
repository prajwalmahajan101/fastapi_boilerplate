repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.0
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pycqa/pydocstyle
    rev: 6.3.0
    hooks:
      - id: pydocstyle
        name: pydocstyle (docstring style)
        files: ^src/.*\.py$

  - repo: https://github.com/terrencepreilly/darglint
    rev: v1.8.1
    hooks:
      - id: darglint
        name: darglint (docstring completeness)
        args: ["-v", "2"]
        files: ^src/.*\.py$

  # Keep requirements/*.txt in sync with requirements/*.in. pre-commit
  # provisions pip-tools into its own managed virtualenv via
  # additional_dependencies, so contributors don't need it on PATH.
  - repo: local
    hooks:
      - id: pip-compile-base
        name: pip-compile (base.in -> base.txt)
        entry: pip-compile --quiet --output-file=requirements/base.txt requirements/base.in
        language: python
        additional_dependencies: ["pip-tools==7.5.3"]
        files: ^requirements/base\.in$
        pass_filenames: false

      - id: pip-compile-dev
        name: pip-compile (dev.in -> dev.txt)
        entry: pip-compile --quiet --output-file=requirements/dev.txt requirements/dev.in
        language: python
        additional_dependencies: ["pip-tools==7.5.3"]
        files: ^requirements/(base|dev)\.in$
        pass_filenames: false

      - id: pip-compile-base-lock
        name: pip-compile (base.in -> base.lock.txt, hash-pinned)
        entry: pip-compile --quiet --generate-hashes --output-file=requirements/base.lock.txt requirements/base.in
        language: python
        additional_dependencies: ["pip-tools==7.5.3"]
        files: ^requirements/base\.in$
        pass_filenames: false

      # Audit hash-pinned production deps for known CVEs. Manual stage —
      # too slow for per-commit. Run weekly via:
      #   pre-commit run --hook-stage manual pip-audit
      - id: pip-audit
        name: pip-audit (CVE scan of base.lock.txt)
        entry: pip-audit -r requirements/base.lock.txt --require-hashes
        language: python
        additional_dependencies: ["pip-audit==2.7.3"]
        stages: [manual]
        pass_filenames: false

      # Catch utility atrophy — a public symbol anywhere in src/core/
      # with no callers in the tree (see scripts/check_dead_utils.py
      # for the rules and the allowlist escape hatch). Broader than
      # the original src/core/utils/ scope so orphans in resilience
      # providers, lifecycle helpers, etc. get caught alongside.
      - id: check-dead-utils
        name: check for dead public symbols under src/core/
        entry: python scripts/check_dead_utils.py
        language: system
        files: ^src/core/.*\.py$
        pass_filenames: false

      # Doc-rot guard: refuse to commit known-stale symbol / lineage
      # references in docs or source. Patterns + replacement hints
      # live in scripts/stale_refs.yaml — append there in the same
      # commit as the rename / delete that retires a name. A single
      # offending line can opt out via `# stale-refs: allow`.
      - id: check-stale-refs
        name: check for stale references in docs + source
        entry: python scripts/check_stale_refs.py
        language: python
        additional_dependencies: ["pyyaml==6.0.2"]
        # Run whenever any scanned surface changes; the script itself
        # walks the include globs so per-file invocation is fine.
        files: >
          ^(
            docs/.*\.md|
            CLAUDE\.md|README\.md|AGENTS\.md|
            src/.*\.(py|md)|
            tests/.*\.(py|md)|
            scripts/.*\.py|
            alembic/.*\.py|
            scripts/stale_refs\.yaml
          )$
        pass_filenames: false

      # Mechanically enforce src/core/CLAUDE.md's "one rule": src.core
      # must not import from src.common or any domain package.
      - id: check-layering
        name: check src/core/ imports stay within core + stdlib + third-party
        entry: python scripts/check_layering.py
        language: system
        files: ^src/core/.*\.py$
        pass_filenames: false

      # Every route under src/api/ must declare DEFAULT_RESPONSES so
      # Swagger renders the ErrorEnvelope contract uniformly. Manual
      # stage — AST-only, fast, but only meaningful when running across
      # all api files at once.
      - id: check-openapi-metadata
        name: check every route includes DEFAULT_RESPONSES
        entry: python scripts/check_openapi_metadata.py
        language: system
        files: ^src/api/.*\.py$
        pass_filenames: false
        stages: [manual]

      # Settings → env-matrix doc drift guard. Runs in manual stage
      # because it needs the full app deps importable (fastapi /
      # sqlalchemy); CI / docs builds exercise it before publishing.
      - id: check-settings-schema
        name: check docs/environment.md matches Settings
        entry: python scripts/dump_settings_schema.py --check
        language: system
        files: ^(src/common/settings\.py|src/core/settings\.py|docs/environment\.md)$
        pass_filenames: false
        stages: [manual]
