[tool.coverage.run]
source = ["src"]
branch = true
omit = [
    "src/**/__init__.py",
    "src/management/init_db.py",
]

[tool.coverage.report]
skip_covered = true
show_missing = true
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
]

[tool.coverage.html]
directory = "htmlcov"

[tool.coverage.xml]
output = "coverage.xml"
