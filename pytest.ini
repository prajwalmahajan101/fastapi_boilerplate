[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
strict_markers = true
strict_config = true
# Coverage gates engage only when --cov is on the command line (e.g.
# `pytest --cov`). The unit-only loop without --cov stays gate-free.
# Overall gate matches docs/testing.md; per-package floors live in
# .coveragerc.
addopts = --cov-fail-under=85
markers =
    unit: pure helper / single-class test, no I/O (auto-applied to tests/unit/**)
    integration: tests against one real backing store, auto-skips when service unreachable (auto-applied to tests/integration/**)
    e2e: full HTTP request through middleware + service + repository + audit (auto-applied to tests/e2e/**)
